world:
  height: 12
  width: 12
  step_time: 0.1
  offset: [0, 0]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.3}
    state: [1, 1, 0]
    goal: [10, 10, 0]
    vel_max: [2, 1]
    behavior: {name: 'dash'}
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 12
        angle_range: 6.2831853
        number: 360
        noise: False

obstacle:
  - kinematics: {name: 'omni_angular'}
    shape: {name: 'rectangle', length: 1.5, width: 0.8}
    state: [5, 5, 0]
    vel_max: [2, 2, 3]
    vel_min: [-2, -2, -3]
    behavior: {name: 'dash', wander: True, range_low: [2, 2, -3.14], range_high: [10, 10, 3.14]}
