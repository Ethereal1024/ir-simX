world:
  height: 12
  width: 12
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  collision_mode: 'stop'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.3}
    state: [1, 10, 0]
    goal: [10, 1, 0]
    vel_max: [2, 1]
    behavior: {name: 'dash'}
    plot:
      show_arrow: True
      show_trajectory: True
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 12
        angle_range: 6.2831853
        number: 1000
        noise: False
        alpha: 0.3

obstacle:
  - number: 4
    distribution: {name: 'manual'}
    kinematics: {name: 'diff'}
    behavior: {name: 'dash', wander: True, range_low: [2, 2, -3.14], range_high: [10, 10, 3.14]}
    state:
      - [2, 10, 0]
      - [5, 9, 0.5]
      - [8, 10, -0.3]
      - [4, 4, 0.8]
    goal:
      - [10, 2, 0]
      - [2, 2, 0]
      - [2, 10, 0]
      - [10, 10, 0]
    shape:
      - {name: 'polygon', vertices: [[-0.8, -0.6], [0.8, -0.6], [0.8, 0.6], [-0.8, 0.6]]}
      - {name: 'polygon', vertices: [[-0.6, -0.8], [0.6, -0.8], [0.9, 0], [0.6, 0.8], [-0.6, 0.8], [-0.9, 0]]}
      - {name: 'polygon', vertices: [[-0.7, -0.5], [0.7, -0.5], [0, 0.9]]}
      - {name: 'polygon', vertices: [[-0.5, -0.7], [0.5, -0.7], [0.8, 0], [0.5, 0.7], [-0.5, 0.7], [-0.8, 0]]}
    vel_max: [1.5, 1]
    plot:
      show_arrow: True
      arrow_length: 0.6
      arrow_color: 'gold'
